name: Bug Report
description: Create a report to help us improve
title: "[Bug] "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Please read the [Contributing Guidelines](https://github.com/harshtries-code/etsume/blob/main/CONTRIBUTING.md) before opening a bug report.
        **Make sure to search the issue tracker to see if this has already been reported.**
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the issue...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Explain how to reproduce the issue.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      description: What version of the app are you using? (e.g., 0.18.1.2)
    validations:
      required: true
  - type: input
    id: android
    attributes:
      label: Android version
      description: What Android version is your device running? (e.g., Android 13)
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device
      description: What device are you using? (e.g., Samsung Galaxy S23)
    validations:
      required: true
  - type: textarea
    id: other
    attributes:
      label: Other details
      description: Add any other context about the problem here. Logs, screenshots, or videos can be very helpful.
    validations:
      required: false
