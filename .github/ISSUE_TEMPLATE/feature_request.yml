name: Feature Request
description: Suggest an idea for this project
title: "[Feature] "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Please read the [Contributing Guidelines](https://github.com/harshtries-code/etsume/blob/main/CONTRIBUTING.md) before submitting a feature request.
        **Please consider starting a Discussion first instead of opening an issue.**
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the feature is and what problem it solves.
      placeholder: I would like to be able to...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe how you think this feature should work.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: A clear and concise description of any alternative solutions or features you've considered.
    validations:
      required: false
